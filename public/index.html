<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeeperLive · Backoffice</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --up:#22c55e; --down:#ef4444; --warn:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:24px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; }
    header h1 { font-size:20px; margin:0; }
    header .dot { width:12px; height:12px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); }
    main { max-width:900px; margin:0 auto; padding:24px; display:grid; gap:24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; }
    .card h2 { margin:0 0 16px; font-size:16px; display:flex; justify-content:space-between; align-items:center; }
    form { display:flex; gap:8px; margin-bottom:16px; }
    input { flex:1; padding:10px 12px; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-size:14px; }
    input:focus { outline:none; border-color:var(--accent); }
    button { padding:10px 14px; border-radius:8px; border:none; background:var(--accent); color:#0f172a; font-weight:600; cursor:pointer; font-size:14px; }
    button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
    button.danger { background:transparent; color:var(--down); border:1px solid var(--line); padding:6px 10px; font-size:13px; }
    ul { list-style:none; margin:0; padding:0; display:grid; gap:8px; }
    li { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--bg); border:1px solid var(--line); border-radius:8px; }
    li .main { flex:1; overflow:hidden; }
    li .url { font-weight:500; word-break:break-all; }
    li .meta { font-size:12px; color:var(--muted); margin-top:2px; }
    .badge { font-size:12px; font-weight:600; padding:3px 8px; border-radius:999px; white-space:nowrap; }
    .badge.up { background:rgba(34,197,94,.15); color:var(--up); }
    .badge.down { background:rgba(239,68,68,.15); color:var(--down); }
    .badge.unknown { background:rgba(148,163,184,.15); color:var(--muted); }
    .empty { color:var(--muted); font-size:14px; padding:8px 0; }
    .err { color:var(--down); font-size:13px; min-height:18px; margin-bottom:8px; }
    .toolbar { display:flex; gap:8px; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>KeeperLive</h1>
    <span style="color:var(--muted);font-size:13px;">uptime keeper &amp; alerting</span>
  </header>

  <main>
    <section class="card">
      <h2>
        Monitored URLs
        <button class="ghost" id="check-now">Check now</button>
      </h2>
      <div class="err" id="url-err"></div>
      <form id="url-form">
        <input id="url-input" type="url" placeholder="https://example.com" autocomplete="off" />
        <button type="submit">Add URL</button>
      </form>
      <ul id="url-list"></ul>
    </section>

    <section class="card">
      <h2>Alert Recipients</h2>
      <div class="err" id="rcpt-err"></div>
      <form id="rcpt-form">
        <input id="rcpt-input" type="email" placeholder="alerts@yourteam.com" autocomplete="off" />
        <button type="submit">Add Email</button>
      </form>
      <ul id="rcpt-list"></ul>
    </section>
  </main>

  <script>
    const $ = (s) => document.querySelector(s);

    async function api(method, url, body) {
      const res = await fetch(url, {
        method,
        headers: body ? { 'Content-Type': 'application/json' } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('Request failed (' + res.status + ')'));
      return data;
    }

    function badge(row) {
      if (row.is_up === 1) return '<span class="badge up">UP ' + (row.last_status || '') + '</span>';
      if (row.is_up === 0) return '<span class="badge down">DOWN ' + (row.last_status || '') + '</span>';
      return '<span class="badge unknown">not checked</span>';
    }

    async function loadUrls() {
      const list = await api('GET', '/api/urls');
      const ul = $('#url-list');
      ul.innerHTML = '';
      if (!list.length) { ul.innerHTML = '<div class="empty">No URLs yet. Add one above.</div>'; return; }
      for (const row of list) {
        const li = document.createElement('li');
        const checked = row.last_checked_at ? new Date(row.last_checked_at).toLocaleString() : 'never';
        li.innerHTML =
          '<div class="main"><div class="url">' + row.url + '</div>' +
          '<div class="meta">last checked: ' + checked + '</div></div>' +
          badge(row) +
          '<button class="danger" data-id="' + row.id + '">Delete</button>';
        li.querySelector('button').onclick = async () => {
          await api('DELETE', '/api/urls/' + row.id);
          loadUrls();
        };
        ul.appendChild(li);
      }
    }

    async function loadRecipients() {
      const list = await api('GET', '/api/recipients');
      const ul = $('#rcpt-list');
      ul.innerHTML = '';
      if (!list.length) { ul.innerHTML = '<div class="empty">No recipients yet. Add one above.</div>'; return; }
      for (const row of list) {
        const li = document.createElement('li');
        li.innerHTML =
          '<div class="main"><div class="url">' + row.email + '</div></div>' +
          '<button class="danger" data-id="' + row.id + '">Delete</button>';
        li.querySelector('button').onclick = async () => {
          await api('DELETE', '/api/recipients/' + row.id);
          loadRecipients();
        };
        ul.appendChild(li);
      }
    }

    $('#url-form').onsubmit = async (e) => {
      e.preventDefault();
      $('#url-err').textContent = '';
      try {
        await api('POST', '/api/urls', { url: $('#url-input').value.trim() });
        $('#url-input').value = '';
        loadUrls();
      } catch (err) { $('#url-err').textContent = err.message; }
    };

    $('#rcpt-form').onsubmit = async (e) => {
      e.preventDefault();
      $('#rcpt-err').textContent = '';
      try {
        await api('POST', '/api/recipients', { email: $('#rcpt-input').value.trim() });
        $('#rcpt-input').value = '';
        loadRecipients();
      } catch (err) { $('#rcpt-err').textContent = err.message; }
    };

    $('#check-now').onclick = async () => {
      const btn = $('#check-now');
      btn.textContent = 'Checking…'; btn.disabled = true;
      try { await api('POST', '/api/check-now'); await loadUrls(); }
      catch (err) { $('#url-err').textContent = err.message; }
      finally { btn.textContent = 'Check now'; btn.disabled = false; }
    };

    loadUrls();
    loadRecipients();
    // Auto-refresh statuses periodically.
    setInterval(loadUrls, 30000);
  </script>
</body>
</html>
